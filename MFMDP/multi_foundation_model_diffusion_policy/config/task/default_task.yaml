name: default_task

shape_meta: &shape_meta
  obs:
    environment_point_cloud:
      shape: [2048, 6]
      type: point_cloud
    active_object_point_cloud:
      shape: [2048, 3]
      type: point_cloud
    passive_object_point_cloud:
      shape: [2048, 3]
      type: point_cloud
    active_object_feature:
      shape: [2048, 5]
      type: point_cloud
    passive_object_point_feature:
      shape: [2048, 5]
      type: point_cloud
    agent_pos:
      shape: [9]
      type: low_dim
  action:
    shape: [9]

env_runner:
  _target_: multi_foundation_model_diffusion_policy.env_runner.robot_runner.RobotRunner
  max_steps: 300
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  task_name: robot

dataset:
  _target_: multi_foundation_model_diffusion_policy.dataset.robot_dataset.RobotDataset
  zarr_path: data/default_task.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 0
  val_ratio: 0.02
  max_train_episodes: null
